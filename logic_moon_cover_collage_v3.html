
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Bebas+Neue&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 16px 0; }
  .canvas-container { position: relative; width: 540px; height: 540px; background: #0a0a0f; overflow: hidden; }
  .grid { display: grid; width: 100%; height: 100%; gap: 3px; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
  .cell { position: relative; overflow: hidden; }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease, filter 0.5s ease; filter: saturate(0.85) contrast(1.05); }
  .cell:hover img { transform: scale(1.08); filter: saturate(1.1) contrast(1.1); }
  .cell-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.65); color: #fff; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.06em; padding: 4px 6px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .cell:hover .cell-label { opacity: 1; }
  .overlay-logo { position: absolute; bottom: 16px; right: 16px; font-family: 'Bebas Neue', monospace; font-size: 13px; letter-spacing: 0.25em; color: rgba(255,255,255,0.85); pointer-events: none; z-index: 10; transition: opacity 0.3s; }
  .corner-mark { position: absolute; top: 12px; left: 12px; width: 18px; height: 18px; pointer-events: none; z-index: 10; }
  .corner-mark::before, .corner-mark::after { content: ''; position: absolute; background: rgba(255,255,255,0.6); }
  .corner-mark::before { top: 0; left: 0; width: 100%; height: 1.5px; }
  .corner-mark::after { top: 0; left: 0; width: 1.5px; height: 100%; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .btn { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 16px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: var(--border-radius-md); cursor: pointer; }
  .btn:hover { background: var(--color-background-secondary); }
  .info-line { font-size: 11px; color: var(--color-text-secondary); font-family: 'Space Mono', monospace; letter-spacing: 0.05em; text-align: center; }
  .style-switcher { display: flex; gap: 4px; }
  .style-btn { font-size: 11px; padding: 5px 12px; border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-family: 'Space Mono', monospace; }
  .style-btn.active { border-color: var(--color-border-primary); color: var(--color-text-primary); background: var(--color-background-secondary); }
</style>

<div class="wrap">
  <h2 class="sr-only">Logic Moon Bandcamp Cover Collage für Instagram</h2>
  <div class="canvas-container">
    <div class="grid" id="grid"></div>
    <div class="corner-mark"></div>
    <div class="overlay-logo" id="logo-text">LOGIC MOON</div>
  </div>
  <div class="controls">
    <div class="style-switcher">
      <button class="style-btn active" onclick="setStyle('grid3', this)">3×3</button>
      <button class="style-btn" onclick="setStyle('mosaic', this)">Mosaic</button>
    </div>
    <button class="btn" onclick="toggleLogo()">Logo ±</button>
    <button class="btn" onclick="shuffleCovers()">Shuffle</button>
  </div>
  <p class="info-line">1:1 · 1080×1080px · hover = Albumtitel · 9 releases</p>
</div>

<script>
const covers = [
  { id: 'a1945827468', title: 'Stellar Refuge' },
  { id: 'a3349553712', title: 'Clockworks' },
  { id: 'a4016680440', title: 'It May Never Coming Back' },
  { id: 'a3518911398', title: 'hello. (Aethery Fields)' },
  { id: 'a2896173050', title: 'Heim' },
  { id: 'a3031305213', title: 'スライン (Aethery Fields)' },
  { id: 'a1259889284', title: 'Reminiscence' },
  { id: 'a3097781026', title: 'Memories Of Tomorrow' },
  { id: 'a0951481877', title: 'Metamorphosis' },
];

let order = [...covers];
let logoVisible = true;

function imgUrl(id) { return `https://f4.bcbits.com/img/${id}_10.jpg`; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleCovers() { order = shuffle(covers); render(); }

function toggleLogo() {
  logoVisible = !logoVisible;
  document.getElementById('logo-text').style.opacity = logoVisible ? '1' : '0';
}

function setStyle(s, btn) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStyle = s;
  render();
}

let currentStyle = 'grid3';

function makeCell(cover, extraStyle) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  if (extraStyle) cell.style.cssText = extraStyle;
  const img = document.createElement('img');
  img.src = imgUrl(cover.id);
  img.alt = cover.title;
  img.onerror = () => { img.src = `https://f4.bcbits.com/img/${cover.id}_2.jpg`; };
  const label = document.createElement('div');
  label.className = 'cell-label';
  label.textContent = cover.title;
  cell.appendChild(img);
  cell.appendChild(label);
  return cell;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (currentStyle === 'grid3') {
    grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
    grid.style.gridTemplateRows = 'repeat(3, 1fr)';
    order.forEach(c => grid.appendChild(makeCell(c)));

  } else if (currentStyle === 'mosaic') {
    grid.style.gridTemplateColumns = '2fr 1fr';
    grid.style.gridTemplateRows = 'repeat(4, 1fr)';
    const big = makeCell(order[0], 'grid-row: 1 / 3;');
    grid.appendChild(big);
    order.slice(1, 9).forEach(c => grid.appendChild(makeCell(c)));
  }
}

render();
</script>
